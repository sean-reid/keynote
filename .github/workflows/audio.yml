name: Precompute audio

on:
  schedule:
    # Every 3 hours: each run tops up only the small gap since the last one, so a
    # single failure is recovered by the next run minutes later.
    - cron: "0 */3 * * *"
  workflow_dispatch:
    inputs:
      count:
        description: "Scenes to keep ready ahead of live"
        default: "96"

concurrency:
  group: precompute-audio
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - id: plan
        run: |
          COUNT="${{ github.event.inputs.count || '96' }}"
          MATRIX=$(node scripts/precompute/range.ts --plan --count "$COUNT" --shards 12)
          echo "matrix={\"include\":$MATRIX}" >> "$GITHUB_OUTPUT"

  # Download every voice once into the shared cache, so the matrix shards below
  # restore it instead of each pulling ~1GB from Hugging Face in parallel.
  models:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Cache Piper voice models
        uses: actions/cache@v4
        with:
          path: data/.piper-models
          key: piper-voices-${{ hashFiles('scripts/precompute/voices.ts') }}
      - name: Download voice models
        run: node scripts/precompute/download-voices.ts

  generate:
    needs: [plan, models]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Piper
        run: |
          curl -fsSL https://github.com/rhasspy/piper/releases/download/2023.11.14-2/piper_linux_x86_64.tar.gz | tar xz
          echo "PIPER_BIN=$PWD/piper/piper" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$PWD/piper:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"
          echo "PIPER_MODELS=$PWD/data/.piper-models" >> "$GITHUB_ENV"

      - name: Cache Piper voice models
        uses: actions/cache@v4
        with:
          path: data/.piper-models
          key: piper-voices-${{ hashFiles('scripts/precompute/voices.ts') }}

      - name: Download voice models
        run: node scripts/precompute/download-voices.ts

      - name: Generate scenes ${{ matrix.from }}-${{ matrix.to }}
        run: node scripts/precompute/index.ts --from ${{ matrix.from }} --to ${{ matrix.to }} --out audio-out

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: audio-${{ matrix.from }}-${{ matrix.to }}
          path: audio-out
          retention-days: 3

      - name: Publish to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          # aws-cli v2.23+ adds request checksums by default, which break SigV4
          # signing against R2 (SignatureDoesNotMatch). Keep them when-required.
          AWS_REQUEST_CHECKSUM_CALCULATION: WHEN_REQUIRED
          AWS_RESPONSE_CHECKSUM_VALIDATION: WHEN_REQUIRED
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        if: ${{ env.AWS_ACCESS_KEY_ID != '' }}
        run: |
          # Scene files are immutable; the catalog index is written once, by the
          # finalize job, from the full bucket contents.
          aws s3 cp audio-out "s3://$R2_BUCKET/audio" --recursive \
            --exclude "index.json" \
            --endpoint-url "https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com" \
            --cache-control "public, max-age=31536000, immutable"

  finalize:
    needs: generate
    runs-on: ubuntu-latest
    steps:
      - name: Publish catalog index
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          # aws-cli v2.23+ adds request checksums by default, which break SigV4
          # signing against R2 (SignatureDoesNotMatch). Keep them when-required.
          AWS_REQUEST_CHECKSUM_CALCULATION: WHEN_REQUIRED
          AWS_RESPONSE_CHECKSUM_VALIDATION: WHEN_REQUIRED
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        if: ${{ env.AWS_ACCESS_KEY_ID != '' }}
        run: |
          # Catalog the bucket, evict scenes that have fallen well behind live so
          # storage stays bounded, then publish the live window for the client.
          ENDPOINT="https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com"
          aws s3 ls "s3://$R2_BUCKET/audio/" --endpoint-url "$ENDPOINT" \
            | grep -oE '[0-9]+\.mp3' | sed 's/\.mp3$//' | sort -n > scenes.txt
          if [ ! -s scenes.txt ]; then echo "no scenes in bucket"; exit 0; fi
          MAX=$(tail -1 scenes.txt)
          KEEP=360
          CUTOFF=$((MAX - KEEP))
          # Delete scenes older than the retention window (mp3 + manifest).
          awk -v c="$CUTOFF" '$1 < c' scenes.txt | while read -r n; do
            [ -n "$n" ] || continue
            aws s3 rm "s3://$R2_BUCKET/audio/$n.mp3" --endpoint-url "$ENDPOINT" >/dev/null 2>&1 || true
            aws s3 rm "s3://$R2_BUCKET/audio/$n.json" --endpoint-url "$ENDPOINT" >/dev/null 2>&1 || true
          done
          MIN=$(awk -v c="$CUTOFF" '$1 >= c' scenes.txt | head -1)
          [ -n "$MIN" ] || MIN=$(head -1 scenes.txt)
          printf '{"version":1,"min":%s,"max":%s}' "$MIN" "$MAX" > index.json
          cat index.json
          aws s3 cp index.json "s3://$R2_BUCKET/audio/index.json" \
            --endpoint-url "$ENDPOINT" \
            --content-type application/json \
            --cache-control "no-cache"
